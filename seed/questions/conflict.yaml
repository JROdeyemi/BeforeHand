# Stress & Conflict Style — drafted for founder review. All active: true until sign-off.
# partner_view rule: only first-person questions get partner_view;
# couple-voice ("We will...") questions never do.

- id: con-001
  text: "We don't go silent on each other — no silent treatment, no days of cold distance, as a way of handling a fight."
  stages: [early_dating, dating, engaged, married]
  contexts: []
  active: true
- id: con-002
  text: "I need space before I can talk — pushing me to resolve things immediately makes it worse, and my partner has to respect that."
  partner_view: "{name} needs space before {they} can talk — pushing {them} to resolve things immediately makes it worse, and {they} need you to respect that."
  stages: [early_dating, dating, engaged, married]
  contexts: []
  active: true
- id: con-003
  text: "Raised voices happen — a heated argument with shouting is survivable and doesn't mean the relationship is broken."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-004
  text: "Some lines, once crossed even once — insults about family, mocking my body, weaponizing my past — permanently change what I can feel for someone. We treat those lines as real."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-005
  text: "We don't walk out mid-argument — leaving the house or driving off is not how either of us exits a fight."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-006
  text: "Apologies in this home are spoken — 'I'm sorry, I was wrong' — not performed through food, gifts, or acting normal the next day."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-007
  text: "We don't sleep on unresolved fights as a habit — a truce before bed, even if the issue waits for morning."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-008
  text: "When I'm stressed from work or life, I withdraw — and I need that read as pressure, not as rejection of my partner."
  partner_view: "When {name} is stressed from work or life, {they} withdraw — and need you to read that as pressure, not as rejection of you."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-009
  text: "My partner should tell me hard truths to my face — I'd rather be hurt by honesty than managed with silence."
  partner_view: "{name} wants hard truths to {their} face — {they} would rather be hurt by your honesty than managed with silence."
  stages: [early_dating, dating, engaged, married]
  contexts: []
  active: true
- id: con-010
  text: "Settled means settled — we don't reopen old resolved fights as ammunition in new ones."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-011
  text: "We never threaten the relationship — 'maybe we should just end this' — in anger. If it's said, it's meant."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-012
  text: "Couples counseling is a tool we'd actually use — before crisis, not as the last stop before a lawyer."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-013
  text: "If my partner struggles with their mental health — depression, anxiety, burnout — professional help is expected, not optional stubbornness."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-014
  text: "Jokes at my expense in front of others — 'banter' that lands on real insecurities — is a fight, not a personality I have to accept."
  partner_view: "Jokes at {name}'s expense in front of others — banter that lands on real insecurities — is a fight to {them}, not a personality {they} have to accept."
  stages: [early_dating, dating, engaged, married]
  contexts: []
  active: true
- id: con-015
  text: "When my partner tells me something hurt them, my first job is to hear it — not to explain why they shouldn't feel that way."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: con-016
  text: "We treat any physical expression of anger — grabbing, shoving, blocking an exit, breaking things — as ending this relationship the first time it happens."
  stages: [early_dating, dating, engaged, married]
  contexts: []
  active: true
