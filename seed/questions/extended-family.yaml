  text: "Family can be told about our finances — what we earn, what we own."
  stages: [dating, engaged, married]
  contexts: []
  active: true
- id: ext-019
  text: "In a serious dispute between us, calling a family meeting to mediate is an acceptable path."
  stages: [engaged, married]
  contexts: []
  active: true
- id: ext-020
  text: "Caring for aging parents hands-on — in our home, with our time, not just our money — is a duty we will carry."
